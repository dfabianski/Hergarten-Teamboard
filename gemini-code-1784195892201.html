<script>
        // Deine neuen, echten Firebase-Daten
        const festeFirebaseConfig = {
            apiKey: "AIzaSyCIFoyJ86qtw44VvPvRK13QCLOANwRKq0k",
            authDomain: "hergarten-dashboard.firebaseapp.com",
            projectId: "hergarten-dashboard",
            storageBucket: "hergarten-dashboard.firebasestorage.app",
            messagingSenderId: "545038509092",
            appId: "1:545038509092:web:63bba33139dd59fc7924b1"
        };

        let projekte = [];
        let logs = [];
        let suchFilter = "";
        let deleteCandidateId = null;
        let isFirebaseConnected = false;
        let unsubscribeProjekte = null;
        let unsubscribeLogs = null;
        let db = null;
        let auth = null;

        window.addEventListener('DOMContentLoaded', () => {
            initApp();
            lucide.createIcons();
        });

        function initApp() {
            verbindeMitFirebase(festeFirebaseConfig);
        }

        function oeffneFormularModal() {
            setzeFormularZurueck();
            document.getElementById('formularModal').classList.remove('hidden');
        }

        function schließeFormularModal() {
            document.getElementById('formularModal').classList.add('hidden');
        }

        function starteOfflineModus() {
            isFirebaseConnected = false;
            const badge = document.getElementById('datenquelleBadge');
            badge.innerText = "Lokaler Offline-Modus";
            badge.className = "inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium bg-amber-100 text-amber-800";
            
            const gespeicherteProjekte = localStorage.getItem('lokale_projekte');
            projekte = gespeicherteProjekte ? JSON.parse(gespeicherteProjekte) : [];

            const gespeicherteLogs = localStorage.getItem('lokale_logs');
            logs = gespeicherteLogs ? JSON.parse(gespeicherteLogs) : [{ text: "Board im Offline-Modus gestartet.", timestamp: Date.now(), user: "System" }];
            
            renderBoard();
            renderLogs();
        }

        async function verbindeMitFirebase(config) {
            const badge = document.getElementById('datenquelleBadge');
            try {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                
                db = firebase.firestore();
                auth = firebase.auth();

                // Versuch der anonymen Anmeldung
                await auth.signInAnonymously();
                isFirebaseConnected = true;

                badge.innerText = "Mit Google Cloud verbunden";
                badge.className = "inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium bg-emerald-100 text-emerald-800";

                if (unsubscribeProjekte) unsubscribeProjekte();
                if (unsubscribeLogs) unsubscribeLogs();

                // Live-Sync Projekte
                unsubscribeProjekte = db.collection('projekte').onSnapshot(snapshot => {
                    let tempProjekte = [];
                    snapshot.forEach(doc => {
                        tempProjekte.push({ id: doc.id, ...doc.data() });
                    });
                    projekte = tempProjekte;
                    renderBoard();
                }, error => {
                    console.error("Firestore Snapshot Fehler:", error);
                    badge.innerText = "Fehler: Firestore blockiert (" + error.code + ")";
                    badge.className = "inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium bg-red-100 text-red-800";
                });

                // Live-Sync Logs
                unsubscribeLogs = db.collection('logs').orderBy('timestamp', 'desc').limit(50).onSnapshot(snapshot => {
                    let tempLogs = [];
                    snapshot.forEach(doc => {
                        tempLogs.push({ id: doc.id, ...doc.data() });
                    });
                    logs = tempLogs;
                    renderLogs();
                }, error => {
                    console.error("Firestore Logs Fehler:", error);
                });

            } catch (err) {
                console.error("Firebase Gesamt-Verbindungsfehler:", err);
                badge.innerText = "Verbindungsfehler: " + err.message;
                badge.className = "inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full font-medium bg-red-100 text-red-800";
                
                // Nach 5 Sekunden schalten wir zur Sicherheit in den Offline-Modus um, damit du arbeiten kannst
                setTimeout(() => {
                    if(!isFirebaseConnected) starteOfflineModus();
                }, 5000);
            }
        }

        function disconnectCloud() {
            if (unsubscribeProjekte) unsubscribeProjekte();
            if (unsubscribeLogs) unsubscribeLogs();
            starteOfflineModus();
        }

        function speichereLokal() {
            if (!isFirebaseConnected) {
                localStorage.setItem('lokale_projekte', JSON.stringify(projekte));
                localStorage.setItem('lokale_logs', JSON.stringify(logs));
            }
        }

        function renderBoard() {
            const listen = {
                neu: document.getElementById('liste-neu'),
                arbeit: document.getElementById('liste-arbeit'),
                test: document.getElementById('liste-test'),
                fertig: document.getElementById('liste-fertig')
            };

            Object.values(listen).forEach(l => { if (l) l.innerHTML = ''; });

            const gefilterteProjekte = projekte.filter(p => {
                const queryStr = suchFilter.toLowerCase();
                const mitarbeiterStr = (p.mitarbeiter || "").toLowerCase();
                return p.titel.toLowerCase().includes(queryStr) || 
                       (p.beschreibung && p.beschreibung.toLowerCase().includes(queryStr)) || 
                       mitarbeiterStr.includes(queryStr) ||
                       p.kategorie.toLowerCase().includes(queryStr);
            });

            gefilterteProjekte.forEach(projekt => {
                const karte = erstelleKartenHTML(projekt);
                if (listen[projekt.status]) {
                    listen[projekt.status].appendChild(karte);
                }
            });

            aktualisiereStatistik();
            lucide.createIcons();
        }

        function fuegeUnterpunktHinzu(wert = "", erledigt = false) {
            const container = document.getElementById('unterpunkteFormContainer');
            
            const div = document.createElement('div');
            div.className = 'flex items-center gap-2 unterpunkt-item';
            div.innerHTML = `
                <input type="checkbox" ${erledigt ? 'checked' : ''} class="w-4 h-4 text-blue-600 rounded border-slate-200 focus:ring-blue-500">
                <input type="text" value="${escapeHTML(wert)}" placeholder="z. B. Konzept freigeben" class="flex-1 px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                <button type="button" onclick="this.parentElement.remove()" class="p-1.5 hover:bg-red-50 rounded-lg text-slate-400 hover:text-red-500 transition-colors">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(div);
            lucide.createIcons();
        }

        function sammleUnterpunkte() {
            const container = document.getElementById('unterpunkteFormContainer');
            const unterpunkte = [];
            container.querySelectorAll('.unterpunkt-item').forEach(item => {
                const checked = item.querySelector('input[type="checkbox"]').checked;
                const text = item.querySelector('input[type="text"]').value.trim();
                if (text) {
                    unterpunkte.push({ text, erledigt: checked });
                }
            });
            return unterpunkte;
        }

        async function toggleUnterpunktQuick(projektId, index, erledigt) {
            const projekt = projekte.find(p => p.id == projektId);
            if (!projekt) return;

            projekt.unterpunkte[index].erledigt = erledigt;

            if (isFirebaseConnected) {
                try {
                    await db.collection('projekte').doc(projektId).update({ unterpunkte: projekt.unterpunkte });
                } catch (err) {
                    console.error("Fehler beim Aktualisieren des Unterpunkts:", err);
                }
            } else {
                speichereLokal();
                renderBoard();
            }
        }

        function erstelleKartenHTML(projekt) {
            const card = document.createElement('div');
            card.setAttribute('draggable', 'true');
            card.className = 'bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition-all cursor-grab active:cursor-grabbing border-l-4 relative group';
            card.id = `card-${projekt.id}`;

            card.addEventListener('dragstart', (e) => dragStart(e, projekt.id));
            card.addEventListener('dragend', dragEnd);

            if (projekt.prio === 'prio-hoch') card.classList.add('border-l-rose-500');
            else if (projekt.prio === 'prio-mittel') card.classList.add('border-l-amber-400');
            else card.classList.add('border-l-emerald-500');

            const mitarbeiterName = projekt.mitarbeiter || "Unzugewiesen";
            const initials = getInitials(mitarbeiterName);
            const avatarColor = getAvatarColor(mitarbeiterName);
            const deadlineBadgeHTML = getDeadlineBadge(projekt.deadline, projekt.status);

            const unterpunkte = projekt.unterpunkte || [];
            const gesamtTasks = unterpunkte.length;
            const erledigteTasks = unterpunkte.filter(t => t.erledigt).length;
            const progressProzent = gesamtTasks > 0 ? Math.round((erledigteTasks / gesamtTasks) * 100) : 0;

            let checklisteHTML = "";
            let progressHTML = "";

            if (gesamtTasks > 0) {
                progressHTML = `
                    <div class="mt-3">
                        <div class="flex items-center justify-between text-[10px] text-slate-500 font-semibold mb-1">
                            <span>Checkliste</span>
                            <span>${erledigteTasks}/${gesamtTasks} erledigt (${progressProzent}%)</span>
                        </div>
                        <div class="w-full bg-slate-100 rounded-full h-1.5">
                            <div class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" style="width: ${progressProzent}%"></div>
                        </div>
                    </div>
                `;

                let checkItems = "";
                unterpunkte.forEach((up, idx) => {
                    checkItems += `
                        <label class="flex items-start gap-2 text-xs text-slate-600 cursor-pointer hover:text-slate-900 mt-1.5">
                            <input type="checkbox" ${up.erledigt ? 'checked' : ''} 
                                   onchange="toggleUnterpunktQuick('${projekt.id}', ${idx}, this.checked)"
                                   class="mt-0.5 w-3.5 h-3.5 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <span class="${up.erledigt ? 'line-through text-slate-400' : ''} leading-tight">${escapeHTML(up.text)}</span>
                        </label>
                    `;
                });

                checklisteHTML = `
                    <div class="mt-3 pt-3 border-t border-slate-100">
                        <div class="space-y-1">
                            ${checkItems}
                        </div>
                    </div>
                `;
            }

            const beschreibungText = projekt.beschreibung ? escapeHTML(projekt.beschreibung) : `<span class="text-slate-400 italic">Keine Beschreibung vorhanden.</span>`;

            card.innerHTML = `
                <div class="absolute top-3 right-3 flex items-center gap-1.5 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button onclick="bearbeiteProjekt('${projekt.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-500 hover:text-slate-800 transition-colors" title="Bearbeiten">
                        <i data-lucide="edit-2" class="w-3.5 h-3.5"></i>
                    </button>
                    <button onclick="frageLöschen('${projekt.id}')" class="p-1 hover:bg-rose-50 rounded text-slate-400 hover:text-rose-600 transition-colors" title="Löschen">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>

                <h3 class="font-bold text-slate-900 pr-12 text-sm leading-tight">${escapeHTML(projekt.titel)}</h3>
                <p class="text-slate-600 text-xs mt-1.5 line-clamp-3 leading-relaxed">${beschreibungText}</p>
                
                ${progressHTML}
                ${checklisteHTML}

                <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between gap-2 flex-wrap">
                    <span class="bg-slate-100 text-slate-600 text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider">${escapeHTML(projekt.kategorie)}</span>
                    <span class="text-[10px] text-slate-400 font-semibold">Ref: #${projekt.ref}</span>
                </div>

                <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between gap-2">
                    <div class="flex items-center gap-1.5">
                        ${deadlineBadgeHTML}
                    </div>
                    <div class="${avatarColor} w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold border shadow-sm cursor-help relative" title="${escapeHTML(mitarbeiterName)}">
                        ${escapeHTML(initials)}
                    </div>
                </div>

                <div class="mt-3 block md:hidden pt-2 border-t border-slate-50 flex items-center gap-1 justify-end">
                    <label class="text-[10px] font-medium text-slate-400">Status:</label>
                    <select onchange="verschiebeManuell('${projekt.id}', this.value)" class="text-[10px] bg-slate-50 border border-slate-200 rounded px-1.5 py-0.5 text-slate-600 font-semibold focus:outline-none">
                        <option value="neu" ${projekt.status === 'neu' ? 'selected' : ''}>Neu</option>
                        <option value="arbeit" ${projekt.status === 'arbeit' ? 'selected' : ''}>In Arbeit</option>
                        <option value="test" ${projekt.status === 'test' ? 'selected' : ''}>Im Test</option>
                        <option value="fertig" ${projekt.status === 'fertig' ? 'selected' : ''}>Fertig</option>
                    </select>
                </div>
            `;
            return card;
        }

        async function logActivity(text) {
            const neuerEintrag = {
                text: text,
                timestamp: Date.now(),
                user: isFirebaseConnected ? "Teammitglied" : "Du (Lokal)"
            };

            if (isFirebaseConnected) {
                try {
                    await db.collection('logs').add(neuerEintrag);
                } catch (e) {
                    console.error("Log-Fehler");
                }
            } else {
                logs.unshift(neuerEintrag);
                speichereLokal();
                renderLogs();
            }
        }

        function dragStart(e, id) {
            e.dataTransfer.setData('text/plain', id);
            setTimeout(() => {
                const target = document.getElementById(`card-${id}`);
                if (target) target.classList.add('opacity-40');
            }, 0);
        }

        function dragEnd(e) {
            e.target.classList.remove('opacity-40');
            document.querySelectorAll('.column-container').forEach(c => {
                c.classList.remove('bg-blue-50/70', 'border-blue-300', 'scale-[1.01]');
            });
        }

        function allowDrop(e) {
            e.preventDefault();
        }

        function dragEnter(e) {
            e.preventDefault();
            const col = e.target.closest('.column-container');
            if (col) {
                col.classList.add('bg-blue-50/70', 'border-blue-300', 'scale-[1.01]');
            }
        }

        function dragLeave(e) {
            const col = e.target.closest('.column-container');
            if (col && !col.contains(e.relatedTarget)) {
                col.classList.remove('bg-blue-50/70', 'border-blue-300', 'scale-[1.01]');
            }
        }

        async function drop(e, zielStatus) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text/plain');
            const projekt = projekte.find(p => p.id == id);

            if (projekt && projekt.status !== zielStatus) {
                const alterStatus = projekt.status;
                const statusMap = { neu: 'Neu', arbeit: 'In Arbeit', test: 'Im Test', fertig: 'Fertig' };
                const logText = `"${projekt.titel}" wurde von "${statusMap[alterStatus]}" nach "${statusMap[zielStatus]}" verschoben.`;

                if (isFirebaseConnected) {
                    try {
                        await db.collection('projekte').doc(id).update({ status: zielStatus });
                        logActivity(logText);
                    } catch (err) {
                        console.error("Verschiebe-Fehler:", err);
                    }
                } else {
                    projekt.status = zielStatus;
                    logActivity(logText);
                    renderBoard();
                }
            }
        }

        async function verschiebeManuell(id, zielStatus) {
            const projekt = projekte.find(p => p.id == id);
            if (projekt && projekt.status !== zielStatus) {
                const alterStatus = projekt.status;
                const statusMap = { neu: 'Neu', arbeit: 'In Arbeit', test: 'Im Test', fertig: 'Fertig' };
                const logText = `"${projekt.titel}" wurde manuell nach "${statusMap[zielStatus]}" verschoben.`;

                if (isFirebaseConnected) {
                    try {
                        await db.collection('projekte').doc(id).update({ status: zielStatus });
                        logActivity(logText);
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    projekt.status = zielStatus;
                    logActivity(logText);
                    renderBoard();
                }
            }
        }

        document.getElementById('projektForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const editId = document.getElementById('editId').value;
            const titel = document.getElementById('titel').value;
            const beschreibung = document.getElementById('beschreibung').value;
            const mitarbeiter = document.getElementById('mitarbeiter').value;
            const deadline = document.getElementById('deadline').value;
            const kategorie = document.getElementById('kategorie').value;
            const prio = document.getElementById('prio').value;
            const unterpunkte = sammleUnterpunkte();

            const projektDaten = { titel, beschreibung, mitarbeiter, deadline, kategorie, prio, unterpunkte };

            if (editId) {
                if (isFirebaseConnected) {
                    try {
                        await db.collection('projekte').doc(editId).update(projektDaten);
                        logActivity(`Projekt "${titel}" bearbeitet.`);
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    const projekt = projekte.find(p => p.id == editId);
                    if (projekt) {
                        Object.assign(projekt, projektDaten);
                        logActivity(`Projekt "${titel}" wurde bearbeitet.`);
                        renderBoard();
                    }
                }
            } else {
                const refNum = getNextRef();
                const neuesProjekt = { ...projektDaten, status: 'neu', ref: refNum };

                if (isFirebaseConnected) {
                    try {
                        await db.collection('projekte').add(neuesProjekt);
                        logActivity(`Projekt "${titel}" (#${refNum}) von ${mitarbeiter} angelegt.`);
                    } catch (err) {
                        console.error(err);
                    }
                } else {
                    neuesProjekt.id = Date.now().toString();
                    projekte.push(neuesProjekt);
                    logActivity(`Projekt "${titel}" (#${refNum}) von ${mitarbeiter} angelegt.`);
                    renderBoard();
                }
            }

            schließeFormularModal();
        });

        function bearbeiteProjekt(id) {
            const projekt = projekte.find(p => p.id == id);
            if (!projekt) return;

            setzeFormularZurueck();

            document.getElementById('editId').value = projekt.id;
            document.getElementById('titel').value = projekt.titel;
            document.getElementById('beschreibung').value = projekt.beschreibung || "";
            document.getElementById('mitarbeiter').value = projekt.mitarbeiter || "";
            document.getElementById('deadline').value = projekt.deadline || "";
            document.getElementById('kategorie').value = projekt.kategorie;
            document.getElementById('prio').value = projekt.prio;

            const container = document.getElementById('unterpunkteFormContainer');
            if (projekt.unterpunkte && projekt.unterpunkte.length > 0) {
                projekt.unterpunkte.forEach(up => {
                    fuegeUnterpunktHinzu(up.text, up.erledigt);
                });
            }

            document.getElementById('formularTitel').innerText = "Projekt bearbeiten";
            document.getElementById('modalIcon').setAttribute('data-lucide', 'edit-3');
            document.getElementById('btnText').innerText = "Speichern";
            
            lucide.createIcons();
            document.getElementById('formularModal').classList.remove('hidden');
        }

        function setzeFormularZurueck() {
            document.getElementById('projektForm').reset();
            document.getElementById('editId').value = "";
            document.getElementById('unterpunkteFormContainer').innerHTML = "";
            document.getElementById('formularTitel').innerText = "Neues IT-Projekt erfassen";
            document.getElementById('modalIcon').setAttribute('data-lucide', 'plus-circle');
            document.getElementById('btnText').innerText = "Anlegen";
            lucide.createIcons();
        }

        function frageLöschen(id) {
            deleteCandidateId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function schließeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            deleteCandidateId = null;
        }

        document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
            if (deleteCandidateId !== null) {
                const projekt = projekte.find(p => p.id == deleteCandidateId);
                const name = projekt ? projekt.titel : "Unbekannt";

                if (isFirebaseConnected) {
                    try {
                        await db.collection('projekte').doc(deleteCandidateId).delete();
                        logActivity(`Projekt "${name}" wurde gelöscht.`);
                    } catch (e) {
                        console.error(e);
                    }
                } else {
                    projekte = projekte.filter(p => p.id != deleteCandidateId);
                    logActivity(`Projekt "${name}" wurde gelöscht.`);
                    renderBoard();
                }

                schließeDeleteModal();
            }
        });

        function renderLogs() {
            const listContainer = document.getElementById('verlaufListe');
            const countContainer = document.getElementById('verlaufZaehler');
            if (!listContainer) return;

            listContainer.innerHTML = '';
            countContainer.innerText = `${logs.length} Einträge`;

            if (logs.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-12 text-slate-400 text-sm">Noch keine Aktivitäten.</div>`;
                return;
            }

            logs.forEach(log => {
                const timeStr = formatLogTime(log.timestamp);
                const entry = document.createElement('div');
                entry.className = 'border-b border-slate-100 pb-3 text-xs';
                entry.innerHTML = `
                    <div class="flex justify-between text-[10px] text-slate-400 font-semibold mb-1">
                        <span>${escapeHTML(log.user || 'Teammitglied')}</span>
                        <span>${timeStr}</span>
                    </div>
                    <p class="text-slate-600 leading-relaxed">${escapeHTML(log.text)}</p>
                `;
                listContainer.appendChild(entry);
            });
        }

        function toggleVerlauf() {
            const drawer = document.getElementById('verlaufDrawer');
            if (drawer) drawer.classList.toggle('translate-x-full');
        }

        async function leereVerlauf() {
            if (isFirebaseConnected) {
                try {
                    const snapshot = await db.collection('logs').get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                } catch (e) {
                    console.error(e);
                }
            } else {
                logs = [];
                renderLogs();
            }
        }

        function getDeadlineBadge(deadline, status) {
            if (!deadline) return `<span class="text-slate-400 text-[10px] font-medium">Keine Deadline</span>`;
            const today = new Date(); today.setHours(0,0,0,0);
            const dl = new Date(deadline);
            const dateStr = formatDate(deadline);

            if (status !== 'fertig' && dl < today) {
                return `<span class="bg-red-50 text-red-600 text-[10px] font-bold px-2 py-0.5 rounded border border-red-100">Überfällig</span>`;
            } else if (status === 'fertig') {
                return `<span class="bg-emerald-50 text-emerald-600 text-[10px] font-medium px-2 py-0.5 rounded border border-emerald-100">Erledigt</span>`;
            } else {
                return `<span class="bg-slate-50 text-slate-500 text-[10px] font-semibold px-2 py-0.5 rounded border border-slate-100">${dateStr}</span>`;
            }
        }

        function getInitials(name) {
            if (!name) return "??";
            const parts = name.trim().split(/\s+/);
            if (parts.length === 1) return parts[0].substring(0, 2).toUpperCase();
            return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
        }

        function getAvatarColor(name) {
            const colors = ['bg-pink-100 text-pink-700 border-pink-200','bg-purple-100 text-purple-700 border-purple-200','bg-blue-100 text-blue-700 border-blue-200','bg-amber-100 text-amber-700 border-amber-200','bg-emerald-100 text-emerald-700 border-emerald-200'];
            let sum = 0; for (let i = 0; i < name.length; i++) sum += name.charCodeAt(i);
            return colors[sum % colors.length];
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const parts = dateStr.split('-');
            if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0]}`;
            return dateStr;
        }

        function formatLogTime(timestamp) {
            if (!timestamp) return '';
            const d = new Date(timestamp);
            return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' (' + d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ')';
        }

        function getNextRef() {
            if (projekte.length === 0) return 210;
            const refs = projekte.map(p => Number(p.ref) || 0);
            return Math.max(...refs) + 1;
        }

        function filterProjekte() {
            const input = document.getElementById('suche');
            if (input) { suchFilter = input.value; renderBoard(); }
        }

        function aktualisiereStatistik() {
            const counts = { neu: 0, arbeit: 0, test: 0, fertig: 0 };
            projekte.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });
            document.getElementById('zaehler-neu').innerText = counts.neu;
            document.getElementById('zaehler-arbeit').innerText = counts.arbeit;
            document.getElementById('zaehler-test').innerText = counts.test;
            document.getElementById('zaehler-fertig').innerText = counts.fertig;
            document.getElementById('stat-gesamt').innerText = projekte.length;
            document.getElementById('stat-arbeit').innerText = counts.arbeit;
            document.getElementById('stat-test').innerText = counts.test;
            document.getElementById('stat-fertig').innerText = counts.fertig;
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
